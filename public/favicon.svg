<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1929"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Shield -->
  <path d="M16 3 L27 7.5 L27 16 C27 22.5 22 27.5 16 29 C10 27.5 5 22.5 5 16 L5 7.5 Z"
        fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linejoin="round"
        filter="url(#glow)" opacity="0.95"/>
  <!-- Inner shield glow fill -->
  <path d="M16 3 L27 7.5 L27 16 C27 22.5 22 27.5 16 29 C10 27.5 5 22.5 5 16 L5 7.5 Z"
        fill="#00d4ff" opacity="0.05"/>
  <!-- Stylized S -->
  <text x="16" y="21" text-anchor="middle" font-family="Arial Black, sans-serif"
        font-weight="900" font-size="14" fill="#00d4ff" filter="url(#glow)" opacity="0.95">S</text>
</svg>